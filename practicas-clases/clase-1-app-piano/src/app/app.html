<div class="container">
  <div class="row">
    <div class="col-lg-4">
      <div class="list-group">
        <p>Teclas de piano</p>

        <ul>
          @for (tecla of teclado; track tecla.numeroSonido) {
            <li class="list-group-item" (click)="aplicarSonido(tecla.numeroSonido)" [style]="'background-color:' + tecla.color">Tecla {{tecla.numeroSonido}}</li>
          }
          <!--
          <li (click)="aplicarSonido(1)" style = "background-color: red;" >Tecla 1</li>
         -->
        </ul>
      </div>
      <!--
      Angular:
      todo evento u accion en ()
      toda directiva en []
      -->
    </div>
  </div>
</div>
